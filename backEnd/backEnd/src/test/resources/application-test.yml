# 테스트(CI 포함) 전용 프로필: 외부 MySQL/Redis 없이 H2 인메모리로 실행한다.
# @SpringBootTest 는 @ActiveProfiles("test") 로 이 설정을 사용한다.
# (단위 테스트는 외부 의존이 없고, @DataJpaTest 는 자체적으로 임베디드 DB 로 대체되므로 무관)
spring:
  # Redis 자동설정 제외 → 테스트 컨텍스트가 Redis 연결을 만들지 않는다.
  # (캐싱은 CacheConfig 가 @Profile("!prod & !test") 라 test 에서 아예 로드되지 않음)
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

  # H2 인메모리 DB
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      # 테스트마다 엔티티로부터 스키마 생성 후 종료 시 제거
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

# 테스트 로그 노이즈 감소
logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
