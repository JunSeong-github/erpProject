#debug: true
# 공통 설정
server:
#  port: 8080
  port: ${PORT:8080}

spring:
  profiles:
    # 로컬에서 별도 지정 안 하면 'local'이 기본 적용됨
    # Render 배포 시 환경변수 SPRING_PROFILES_ACTIVE=prod 로 지정
    default: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true # (옵션) 색깔 강조

  # 엑셀 대량 입고 업로드용 멀티파트 크기 제한 (초과 시 MaxUploadSizeExceededException → GlobalExceptionHandler 처리)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

decorator:
  datasource:
    p6spy:
      enable-logging: true

---
# 로컬 프로필: 로컬 MySQL(3306) 사용
# 접속 정보는 환경변수로 주입 (없으면 기본값 root / 250756 / erp 사용)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    # rewriteBatchedStatements=true : JDBC batch insert 를 실제로 multi-row 로 묶어 보냄(대량 입고 성능)
    url: jdbc:p6spy:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:erp}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:250756}

  # Redis 연결 설정 (Lettuce 기본) — local 에서만 사용. 캐싱(@EnableCaching)도 local 전용(CacheConfig).
  # docker compose 로 띄운 127.0.0.1:6379 사용, 필요 시 환경변수로 override.
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}   # 비밀번호 없으면 빈 값
      timeout: 2000ms                 # 연결/명령 타임아웃

# 로컬은 http라 secure 쿠키가 안 붙으므로 기본값(lax, non-secure) 사용 → 세션 로그인 정상 동작

---
# 운영 프로필(Render): PostgreSQL 사용
# 접속 정보는 환경변수로 주입 (Render Environment에 DB_URL / DB_USERNAME / DB_PASSWORD 등록)
# ※ 대량 입고 batch 성능을 위해 DB_URL 에 reWriteBatchedInserts=true 파라미터를 추가할 것
#   예) jdbc:postgresql://.../erp_c2jy?reWriteBatchedInserts=true
spring:
  config:
    activate:
      on-profile: prod
  # prod 에는 Redis 가 없다. 캐싱은 CacheConfig(@Profile("!prod"))가 빠져서 이미 꺼지지만,
  # spring-boot-starter-data-redis 가 클래스패스에 있으면 Redis 연결팩토리 빈이 자동생성되므로
  # 아예 자동설정을 제외해 Redis 관련 빈을 만들지 않는다(연결 시도 자체가 없음).
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# cross-site(프론트 github.io ↔ 백엔드 onrender.com) 세션 쿠키 전송을 위해 None/Secure 필요
server:
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
