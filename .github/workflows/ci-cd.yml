name: CI/CD

# 트리거: main 브랜치로의 push, 그리고 main 을 향한 Pull Request
# (PR 은 테스트/빌드 검증만, 배포는 이후 추가할 CD 잡에서 main push 에만 수행)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 최소 권한(소스 읽기만)
permissions:
  contents: read

# 같은 브랜치에서 새 실행이 오면 진행 중인 이전 실행은 취소(리소스 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────── CI: 테스트 & 빌드 ─────────────────────────────
  build-test:
    name: 백엔드 테스트 & 빌드
    runs-on: ubuntu-latest

    # 모노레포이므로 Gradle 프로젝트 루트에서 명령을 실행
    defaults:
      run:
        working-directory: backEnd/backEnd

    steps:
      # 1) 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) JDK 17(Temurin) 설정 + Gradle 캐시(의존성/빌드 캐시로 실행 속도 향상)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3) gradlew 실행 권한 부여
      #    (Windows 에서 커밋된 래퍼는 리눅스 러너에서 실행 권한이 없을 수 있음)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4) 테스트 실행
      #    - test 프로필 + H2 인메모리로 동작하므로 외부 MySQL/Redis 불필요
      #    - 단위(Mockito) / @DataJpaTest(H2) / @SpringBootTest(H2) 전부 포함
      #    - 테스트가 하나라도 실패하면 이 스텝이 0 이 아닌 코드로 종료 → 잡/파이프라인 실패
      - name: Run tests
        run: ./gradlew test

      # 5) 빌드(부트 jar 생성)
      #    - 위에서 이미 테스트가 실행됐으므로 -x test 로 중복 실행을 피함
      - name: Build (bootJar)
        run: ./gradlew build -x test

      # 6) 테스트 리포트 업로드(성공/실패 무관) — 실패 원인 분석 편의
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backEnd/backEnd/build/reports/tests/test
          if-no-files-found: ignore

  # ───────────────────────────── CD: Render 자동 배포 ─────────────────────────────
  deploy:
    name: Render 배포
    # build-test(테스트·빌드)가 성공해야만 실행 → 실패 시 배포는 건너뜀(순서 보장)
    needs: build-test
    # main 브랜치 push 에서만 배포(PR/다른 브랜치는 배포하지 않음)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Render Deploy Hook URL(민감정보)을 호출해 배포를 트리거한다.
      # URL 은 GitHub Secrets(RENDER_DEPLOY_HOOK_URL)로만 참조하고 로그에 노출하지 않는다.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          # Secret 미등록 방지 가드
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL Secret 이 없습니다. 저장소 Settings > Secrets and variables > Actions 에 등록하세요."
            exit 1
          fi
          # -f: HTTP 4xx/5xx 면 실패 처리, -s: 조용히, -S: 에러는 표시
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render 배포를 트리거했습니다. (진행 상황은 Render 대시보드에서 확인)"

  # ─────────────────────── CD: 프론트엔드 배포 (gh-pages) ───────────────────────
  # 백엔드 배포(deploy)와 독립적인 별도 잡 → needs 없음.
  # 서로 참조하지 않으므로 한쪽이 실패해도 다른 쪽을 막지 않는다(각자 자기 빌드가 게이트).
  deploy-frontend:
    name: 프론트엔드 배포 (gh-pages)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # gh-pages 브랜치에 push 하려면 GITHUB_TOKEN 에 쓰기 권한 필요(이 잡에만 부여)
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backEnd/frontEnd
    steps:
      # 1) 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Node 20 + npm 캐시(모노레포라 lock 파일 경로 지정)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backEnd/frontEnd/package-lock.json

      # 3) 의존성 설치(lock 기준 재현 설치)
      - name: Install dependencies
        run: npm ci

      # 4) 프로덕션 빌드
      #    vite build 는 프로덕션 모드라 .env.production 을 자동 로드 →
      #    VITE_API_BASE(=Render 백엔드 URL)가 번들에 주입된다(별도 주입 불필요).
      - name: Build
        run: npm run build

      # 5) gh-pages 배포 (원래 방식과 동일: package.json 의 "deploy" = gh-pages -d dist)
      #    CI 에서 push 하려면 인증 필요 → GITHUB_TOKEN 을 원격 URL 로 전달하고 커밋 작성자 지정
      - name: Deploy dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 커밋 작성자 이름/이메일에 대괄호([bot])가 있으면 gh-pages 파서가 실패하므로 대괄호 없이 지정
          npm run deploy -- \
            -u "github-actions <github-actions@github.com>" \
            -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
